<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Proyectos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/list.css">
</head>
<body>
<header>
    <div class="container">
        <div th:insert="~{fragments/nav-admin :: nav-admin}"></div>
    </div>
</header>

<main>
    <div class="container">
        <section class="admin-section">
            <div class="menu-list">
                <button class="btn-logout" type="button" th:onclick="|window.location.href='@{/projects/new-project}'|">
                    Crear Nuevo Proyecto
                </button>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" >
                    <button type="submit" class="btn-logout">Cerrar Sesión</button>
                </form>
            </div>

            <h2>Proyectos guardados</h2>

            <div th:if="${message}">
                <p class="success-message" th:text="${message}"></p>
            </div>
            <div th:if="${error}">
                <p class="error-message" th:text="${error}"></p>
            </div>

            <table class="admin-table">
                <thead>
                <tr>
                    <th>Título</th>
                    <th>Descripción</th>
                    <th>URL del Proyecto</th>
                    <th>Imagen del Proyecto</th>
                    <th>Acciones</th> </tr>
                </thead>
                <tbody>
                <tr th:each="project : ${projects}">
                    <td th:text="${project.title}">Título del Proyecto</td>
                    <td th:text="${project.description}">Descripción</td>
                    <td th:text="${project.projectUrl}">URL del Proyecto</td>
                    <td>
                        <img th:src="@{${project.imageUrl}}" alt="Imagen del Proyecto" style="max-width: 100px;">
                    </td>
                    <td>
                        <a th:href="@{/projects/edit/{id}(id=${project.id})}" class="btn-edit">Editar</a>
                        <form th:action="@{/projects/delete/{id}(id=${project.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn-delete" onclick="return confirm('¿Estás seguro de que quieres eliminar este proyecto de tu portfolio?');">Eliminar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <p th:if="${projects.isEmpty()}" class="no-data-message">No hay proyectos registrados.</p>

        </section>
    </div>
</main>

<div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
