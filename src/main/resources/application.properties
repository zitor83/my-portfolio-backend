
# Usa el puerto de Render (${PORT}). Si no existe, usa el 8080 (Localhost)
server.port=${PORT:8080}
spring.application.name=portfolio
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

spring.sql.init.mode=always

file.upload.dir=src/main/resources/static/img/projects
#Importante para que Spring sirva lo que se escribe en disco SIN reiniciar
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/

spring.threads.virtual.enabled=true

spring.datasource

# Ordenar las secciones (Tags) alfabķticamente (respetarß tus n·meros 1, 2, 3...)
springdoc.swagger-ui.tags-sorter=alpha

# Ordenar los mķtodos HTTP de forma l¾gica (GET, POST, PUT, DELETE)
springdoc.swagger-ui.operations-sorter=method